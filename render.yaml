        value: credlocity-prod-secret-2024-xk9m2
      - key: JWT_SECRET_KEY
        value: credlocity-jwt-prod-2024-p8n4v
      - key: STRIPE_SECRET_KEY
        value: sk_test_placeholder
      - key: OPENAI_API_KEY
        value: sk-placeholder
